---
layout: default
title: 全部文章 - Jason's Blog
is_archive: true
---

<div class="page-header">
    <h1>全部文章</h1>
</div>

<main class="container">
    <section class="archive-section" aria-label="文章归档">

        <!-- 移动端：分类面板开关（桌面端隐藏） -->
        <button type="button" class="archive-tree-toggle" aria-expanded="false" aria-controls="archive-tree">
            <i class="fas fa-list-ul" aria-hidden="true"></i> 分类筛选
        </button>

        <div class="archive-layout">
            <!-- 左侧树形导航（由 archive.js 依据 category-config.js 渲染） -->
            <aside id="archive-tree" class="archive-tree" aria-label="分类导航" hidden>
                <nav>
                    <ul class="archive-tree__list" role="tree"></ul>
                </nav>
            </aside>

            <div class="archive-content">
                <div class="archive-toolbar">
                    <nav class="archive-breadcrumb" aria-label="当前分类"></nav>
                    <p class="archive-count" role="status"></p>
                </div>
                <section id="archive-grid" class="post-grid" aria-live="polite"></section>
                <p class="archive-empty" hidden>
                    <i class="fas fa-inbox" aria-hidden="true"></i> 该分类下暂无文章
                </p>
            </div>
        </div>

        <!-- 无 JS 降级：Liquid 渲染全量文章（含 hidden 文章，与本页口径一致） -->
        <noscript>
            <div class="post-grid archive-fallback">
                {% assign all_posts = site.academic | concat: site.life | sort: 'date' | reverse %}
                {% for post in all_posts %}
                <a href="{{ post.url | relative_url }}" class="post-card">
                    <div class="post-img">
                        <img src="{{ post.featured_image | default: '/assets/images/default.webp' | relative_url }}"
                            alt="{{ post.title }}" loading="lazy">
                    </div>
                    <div class="post-content">
                        {% if post.tags %}
                        <div class="post-tags">
                            {% assign tag_string = post.tags | join: ',' %}
                            {% assign tag_list = tag_string | split: ',' %}
                            {% for tag in tag_list %}
                                {% assign trimmed_tag = tag | strip %}
                                {% assign tag_class = 'default' %}
                                {% if trimmed_tag contains '学术' or trimmed_tag contains 'academic' %}
                                    {% assign tag_class = 'academic' %}
                                {% elsif trimmed_tag contains '生活' or trimmed_tag contains 'life' %}
                                    {% assign tag_class = 'life' %}
                                {% endif %}
                                <span class="post-tag {{ tag_class }}">{{ trimmed_tag }}</span>
                            {% endfor %}
                        </div>
                        {% endif %}
                        <h3>{{ post.title }}</h3>
                        <p class="post-date">{{ post.date | date: "%Y年%m月" }}</p>
                        <p>{{ post.excerpt }}</p>
                    </div>
                </a>
                {% endfor %}
            </div>
        </noscript>

    </section>
</main>
