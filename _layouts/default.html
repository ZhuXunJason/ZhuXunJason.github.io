<!DOCTYPE html>
<html lang="zh-CN"{% if page.is_home %} class="home-page-root"{% endif %}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% seo %}
  <title>{% if page.title %}{{ page.title }} - {% endif %}Jason's Blog</title>
  <script>
    (function () {
      const storageKey = 'themePreference';
      const validPreferences = ['light', 'reading'];

      try {
        const root = document.documentElement;
        const stored = localStorage.getItem(storageKey);
        const preference = validPreferences.includes(stored) ? stored : 'light';

        root.setAttribute('data-theme-preference', preference);
        root.setAttribute('data-theme', preference);
      } catch (error) {
        document.documentElement.setAttribute('data-theme-preference', 'light');
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <!-- Latex Support -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" integrity="sha384-5TcZemv2l/9On385z///+d7MSYlvIEw9FuZTIdZ14vJLqWphw7e7ZPuOiCHJcFCP" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js" integrity="sha384-cMkvdD8LoxVzGF/RPUKAcvmm49FQ0oxwDF3BGKtDXcEc+T1b2N+teh/OJfpU0jr6" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
      });
    });
  </script>
</head>

<body{% if page.is_home %} class="home-page"{% endif %}>
<a class="skip-link" href="#main-content">跳到正文</a>
{% if page.is_home %}
<script src="{{ '/assets/js/switch.js' | relative_url }}"></script>
{% endif %}
<script src="{{ '/assets/js/posts-data.js' | relative_url }}"></script>
<script src="{{ '/assets/js/post-utils.js' | relative_url }}"></script>

  {% include header.html %}

  <div class="content-wrapper" id="main-content">
    {{ content }}
  </div>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
