---
layout: default
---

<div class="article-page article-special">
    <div id="password-prompt-overlay" class="visible">
        <div id="password-prompt-container">
            <div class="password-icon">
                <i class="fas fa-heart"></i>
            </div>
            <h3>请输入密码，展开这封信</h3>
            <div class="password-input-wrapper">
                <input type="password" id="password-input" autocomplete="current-password">
                <button id="password-submit-button">
                    <i class="fas fa-key"></i>
                    <span>解锁</span>
                </button>
            </div>
            <p id="error-message" style="display:none;" aria-live="polite"></p>
            <div class="password-footer">
                <small>♡ 忘记密码？请联系作者获取</small>
            </div>
        </div>
    </div>

    <div class="article-container">
        <div class="article-header">
            {% include post-tags.html %}
            <h1>{{ page.title }}</h1>
            <div class="article-meta">
                <span>作者：{{ page.author | default: '朱洵' }}</span>
                <span class="divider">|</span>
                <span>日期：{{ page.date | date: "%Y年%m月" }}</span>
            </div>
        </div>

        {% if page.featured_image %}
        <div class="article-featured-img">
            <img src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}">
        </div>
        {% endif %}

        <div class="article-content" id="main-article-content" style="display:none;" aria-live="polite">
        </div>
        {% if page.source %}
        <template id="sourceNoticeTemplate">
            <blockquote>
                <p>本文转载自{{ page.source }}</p>
            </blockquote>
        </template>
        {% endif %}

        <div class="article-divider">
            <div class="divider-line"></div>
            <div class="divider-content">
                <div class="divider-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <h2 class="divider-title">相关推荐</h2>
            </div>
            <div class="divider-line"></div>
        </div>

        <div id="related-posts-container" class="related-articles-section"></div>
    </div>

    <script id="encryptedDataContainer" type="application/json">
{{ content | strip }}
</script>
    <section id="toc-container"></section>

    <script src="{{ '/assets/js/encrypt.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/recommend.js' | relative_url }}"></script>
</div>

<button id="back-to-top-btn" title="回到顶部"><i class="fas fa-arrow-up"></i></button>

<div id="music-controller">
    <button id="music-btn" title="播放/暂停音乐">
        <i class="fas fa-music"></i>
    </button>
    <audio id="background-music" preload="auto" loop>
        {% if page.music and page.music != "" %}
        <source src="{{ page.music | relative_url }}" type="audio/mpeg">
        {% else %}
        <source src="{{ '/assets/music/瞬 - 郑润泽.mp3' | relative_url }}" type="audio/mpeg">
        {% endif %}
        您的浏览器不支持音频播放。
    </audio>
</div>
