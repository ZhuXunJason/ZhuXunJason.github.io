---
layout: default
---

<div class="article-page article-special">
    <div id="password-prompt-overlay" class="password-prompt-overlay visible" role="dialog" aria-modal="true"
        aria-labelledby="password-modal-title">
        <div id="password-prompt-container" class="password-prompt-container">
            <div class="password-icon">
                <i class="fas fa-heart" aria-hidden="true"></i>
            </div>
            <h2 id="password-modal-title">请输入密码，展开这封信</h2>
            <div class="password-input-wrapper">
                <input type="password" id="password-input" class="password-input" autocomplete="current-password"
                    aria-label="文章密码">
                <button id="password-submit-button" class="password-submit-button">
                    <i class="fas fa-key" aria-hidden="true"></i>
                    <span>解锁</span>
                </button>
            </div>
            <p id="error-message" class="error-message" style="display:none;" aria-live="polite"></p>
            <div class="password-footer">
                <small>♡ 忘记密码？请联系作者获取</small>
            </div>
        </div>
    </div>

    <div class="article-container">
        <div class="article-header">
            {% include post-tags.html %}
            <h1>{{ page.title }}</h1>
            <div class="article-meta">
                <span>作者：{{ page.author | default: '朱洵' }}</span>
                <span class="divider">|</span>
                <span>日期：{{ page.date | date: "%Y年%m月" }}</span>
            </div>
        </div>

        {% if page.featured_image %}
        <div class="article-featured-img">
            <img src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}">
        </div>
        {% endif %}

        <div class="article-content main-article-content" id="main-article-content" style="display:none;"
            aria-live="polite">
        </div>
        {% if page.source %}
        <template id="sourceNoticeTemplate">
            <blockquote>
                <p>本文转载自{{ page.source }}</p>
            </blockquote>
        </template>
        {% endif %}

        <div class="article-divider">
            <div class="divider-line"></div>
            <div class="divider-content">
                <div class="divider-icon">
                    <i class="fas fa-heart" aria-hidden="true"></i>
                </div>
                <h2 class="divider-title">相关推荐</h2>
            </div>
            <div class="divider-line"></div>
        </div>

        <div id="related-posts-container" class="related-articles-section related-posts-container"></div>
    </div>

    <script id="encryptedDataContainer" type="application/json">
{{ content | strip }}
</script>
    <section id="toc-container" class="toc-container"></section>

    <script src="{{ '/assets/js/encrypt.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/recommend.js' | relative_url }}"></script>
</div>


<div id="music-controller" class="music-controller">
    <button id="music-btn" class="music-btn" title="播放/暂停音乐">
        <i class="fas fa-music" aria-hidden="true"></i>
    </button>
    <iframe id="qq-music-frame" class="qq-music-frame"
        src="https://i.y.qq.com/n2/m/outchain/player/index.html?songid={% if page.song_id %}{{ page.song_id }}{% else %}323506552{% endif %}&songtype=0"
        frameborder="0" scrolling="no" loading="lazy" allow="autoplay; encrypted-media" aria-hidden="true"
        title="背景音乐"></iframe>
</div>
